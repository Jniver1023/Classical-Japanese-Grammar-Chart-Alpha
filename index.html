<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classical Japanese Grammar Reference</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #dee2e6;
            --nav-bg: #2c3e50;
            --highlight: #27ae60;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --primary: #ecf0f1;
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #e0e0e0;
            --border: #444;
            --nav-bg: #000000;
        }

        body { 
            font-family: "MS Mincho", "Hiragino Mincho ProN", serif; 
            padding-top: 80px; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            transition: background 0.3s, color 0.3s;
        }

        nav {
            position: fixed; top: 0; width: 100%;
            background: var(--nav-bg); padding: 10px 0;
            z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
        }

        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.85em; }
        
        .dark-mode-btn {
            background: #444; color: white; border: none; padding: 5px 12px;
            border-radius: 20px; cursor: pointer; font-size: 0.8em; margin-left: 20px;
        }

        .container { 
            max-width: 1500px; margin: 20px auto; background: var(--card-bg); 
            padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .acknowledgment {
            text-align: center; font-style: italic; font-size: 0.9em;
            color: #7f8c8d; margin-bottom: 20px;
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }

        /* Master Search Styling */
        .master-search-container {
            text-align: center; margin: 30px 0; padding: 20px;
            background: rgba(0,0,0,0.03); border-radius: 8px;
        }
        #masterSearch {
            padding: 12px 20px; width: 60%; font-size: 1.1em;
            border-radius: 25px; border: 2px solid var(--border);
            background: var(--card-bg); color: var(--text);
        }

        .table-section { margin-bottom: 60px; }
        h2 { border-left: 6px solid var(--highlight); padding-left: 15px; margin-bottom: 20px; }

        /* DataTables Customization for Dark Mode */
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, 
        .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_processing, 
        .dataTables_wrapper .dataTables_paginate { color: var(--text) !important; }
        table.dataTable { border-color: var(--border) !important; }
        table.dataTable tbody tr { background-color: var(--card-bg) !important; color: var(--text) !important; }
        .dataTables_filter { display: none; } /* Hide individual search boxes */
    </style>
</head>
<body>

<nav>
    <a href="#verb-sec">VERBS</a>
    <a href="#aux-sec">AUXILIARIES</a>
    <a href="#adj-sec">ADJECTIVES</a>
    <button class="dark-mode-btn" onclick="toggleDarkMode()">🌓 Toggle Dark Mode</button>
</nav>

<div class="container">
    <h1>Koten Grammar Module</h1>
    <div class="acknowledgment">
        Based on data and structures from Haruo Shirane, <i>Classical Japanese: A Grammar</i>.
    </div>

    <div class="master-search-container">
        <input type="text" id="masterSearch" placeholder="Master Search (e.g., 'MZ', 'Causative', or '蹴る')...">
    </div>

    <div id="verb-sec" class="table-section">
        <h2 style="color: #27ae60;">Verbs (動詞)</h2>
        <table id="verbTable" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Conjugation</th><th>Row</th><th>Verb</th><th>Stem</th>
                    <th>MZ</th><th>RY</th><th>SS</th><th>RT</th><th>IZ</th><th>MR</th>
                </tr>
            </thead>
        </table>
    </div>

    <div id="aux-sec" class="table-section">
        <h2 style="color: #2980b9;">Auxiliary Verbs (助動詞)</h2>
        <table id="auxTable" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Aux Verb</th><th>Functions</th><th>MZ</th><th>RY</th><th>SS</th>
                    <th>RT</th><th>IZ</th><th>MR</th><th>Type</th><th>Follows</th>
                </tr>
            </thead>
        </table>
    </div>

    <div id="adj-sec" class="table-section">
        <h2 style="color: #e67e22;">Adjectives (形容詞)</h2>
        <table id="adjTable" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Type</th><th>Example</th><th>Stem</th><th>MZ</th><th>RY</th>
                    <th>SS</th><th>RT</th><th>IZ</th><th>MR</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
// --- CLEANED DATA (Endings Removed) ---

const AUX_DATA = `Aux Verbs	Functions	MZ	RY	SS	RT	IZ	MR	Conjugation Type	Follows

らる	"Spontaneuous, potential, passive, honorific"	られ	られ	らる	らるる	らるれ	られよ	Shimo-Nidan	MZ of verbs other than above
す	"Causative, honorific"	せ	せ	す	する	すれ	せよ	Shimo-Nidan	MZ of YD, NH, RH verbs

たり	"Resultative, continuative, perfective, parallel"	たら	たり	たり	たる	たれ	たれ	Rahen	RY
り	"Resultative, certainty, perfective"	ら	り	り	る	れ	れ	Rahen	IZ of YD, MZ of SH
き	Personal Past	（せ）	（O）	き	し	しか	（O）	Special	RY (Special after KH and SH)
けり	"Hearsay past, exclamatory recog, direct past"	（けら）	（O）	けり	ける	けれ	（O）	Rahen	RY

const ADJ_DATA = `Conjugation	Example	Stem	MZ	RY	SS	RT	IZ	MR
Ku Adj	清し	きよ	（O）	きよく	きよし	きよき	きよけれ	（O）

Tari Adj V	堂々たり	だうだう	どうどうたら	どうどうたり	どうどうたり	どうどうたる	どうどうたれ	どうどうたれ`;

$(document).ready(function() {
    const commonConfig = { delimiter: "\t", header: true, skipEmptyLines: true };

    const verbTbl = $('#verbTable').DataTable({ 
        data: Papa.parse(VERB_DATA.trim(), commonConfig).data, 
        columns: [
            { data: "Conjugation" }, { data: "Row" }, { data: "verb" }, { data: "stem" },
            { data: "MZ" }, { data: "RY" }, { data: "SS" }, { data: "RT" }, { data: "IZ" }, { data: "MR" }
        ],
        pageLength: 15
    });

    const auxTbl = $('#auxTable').DataTable({ 
        data: Papa.parse(AUX_DATA.trim(), commonConfig).data, 
        columns: [
            { data: "Aux Verbs" }, { data: "Functions" }, { data: "MZ" }, { data: "RY" }, { data: "SS" },
            { data: "RT" }, { data: "IZ" }, { data: "MR" }, { data: "Conjugation Type" }, { data: "Follows" }
        ],
        pageLength: 20
    });

    const adjTbl = $('#adjTable').DataTable({ 
        data: Papa.parse(ADJ_DATA.trim(), commonConfig).data, 
        columns: [
            { data: "Conjugation" }, { data: "Example" }, { data: "Stem" }, { data: "MZ" }, { data: "RY" },
            { data: "SS" }, { data: "RT" }, { data: "IZ" }, { data: "MR" }
        ],
        pageLength: 10
    });

    // MASTER SEARCH LOGIC
    $('#masterSearch').on('keyup', function() {
        const val = this.value;
        verbTbl.search(val).draw();
        auxTbl.search(val).draw();
        adjTbl.search(val).draw();
    });
});

function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
}
</script>

</body>
</html>
